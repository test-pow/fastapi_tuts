version: "3.8"

services: 
  db:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: "Krish08021998"
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: "fastapi_db"
    ports:
      - "3366:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  fastapi_app:
    build: .
    container_name: fastapi_app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - MYSQL_HOST = db
      - MYSQL_PORT = 3306
      - MYSQL_USER = admin
      - MYSQL_PASSWORD = Krish08021998
      - MYSQL_DATABASE = fastapi_db
volumes:
  mysql_data: